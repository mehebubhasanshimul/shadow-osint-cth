<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SHADOW OSINT INVESTOR</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #00ffcc; /* Premium Cyan */
            --accent: #ff0055;  /* Neon Cyber Pink */
            --warning: #ffcc00;
            /* আপনার দেওয়া গ্লিচ ম্যাট্রিক্স ব্যাকগ্রাউন্ড */
            --bg-hack: url('https://media.giphy.com/media/3oKIPlCroSFHV8uoko/giphy.gif');
            /* প্রিমিয়াম গ্লাস-মর্ফিজম ব্যাকগ্রাউন্ড ও শ্যাডো */
            --glass-bg: rgba(255, 255, 255, 0.06);
            --glass-border: rgba(255, 255, 255, 0.15);
            --neon-glow: 0 8px 32px 0 rgba(0, 0, 0, 0.5), 0 0 20px rgba(0, 255, 204, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Consolas', 'Fira Code', monospace; }

        body {
            background-image: var(--bg-hack);
            background-size: cover; background-position: center; background-attachment: fixed;
            min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #fff; padding: 20px;
            overflow-x: hidden;
        }

        /* Premium Glassmorphism Card */
        .container {
            width: 100%; max-width: 500px; padding: 40px 30px; 
            background: var(--glass-bg);
            backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
            border-radius: 24px; border: 1px solid var(--glass-border); box-shadow: var(--neon-glow);
            text-align: center; position: relative;
            transition: all 0.4s ease;
        }

        .container:hover {
            border-color: var(--primary);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.6), 0 0 30px rgba(0, 255, 204, 0.4);
        }

        .logo-wrapper { position: relative; width: 100px; height: 100px; margin: 0 auto 20px; }
        
        /* আপনার দেওয়া সিম্পসন লোগো */
        .logo-gif { 
            width: 100%; height: 100%; border-radius: 50%; 
            border: 2px solid var(--primary); padding: 3px;
            background: rgba(0,0,0,0.4); object-fit: cover; 
        }

        h1 {
            font-size: 1.6rem; font-weight: 900; letter-spacing: 2px; color: #fff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5), 0 0 20px var(--primary);
            text-transform: uppercase; margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.75rem; color: var(--primary); letter-spacing: 3px;
            text-transform: uppercase; display: block; margin-bottom: 25px;
            font-weight: bold; opacity: 0.9;
        }

        .input-group { position: relative; margin-bottom: 20px; }
        
        input {
            width: 100%; padding: 16px 20px; 
            background: rgba(0, 0, 0, 0.6); border: 1px solid var(--glass-border);
            border-radius: 14px; color: var(--primary); font-size: 0.95rem; outline: none; text-align: center;
            transition: 0.3s;
        }
        input:focus { 
            border-color: var(--primary); 
            background: rgba(0, 0, 0, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3); 
        }

        button.scan-btn {
            width: 100%; padding: 16px; 
            background: linear-gradient(135deg, rgba(0, 255, 204, 0.2), rgba(0, 82, 194, 0.2));
            border: 1px solid var(--primary); border-radius: 14px; font-weight: bold; font-size: 0.95rem;
            cursor: pointer; text-transform: uppercase; letter-spacing: 2px; color: #fff; transition: 0.4s;
            backdrop-filter: blur(5px);
        }
        button.scan-btn:hover { 
            background: var(--primary); color: #000; 
            box-shadow: 0 0 20px var(--primary); transform: translateY(-2px); 
        }

        /* গ্লাস টার্মিনাল উইন্ডো */
        #result {
            display: none; margin-top: 25px; text-align: left; 
            background: rgba(0, 0, 0, 0.8);
            padding: 20px; border-radius: 14px; border: 1px solid var(--glass-border);
            max-height: 280px; overflow-y: auto;
        }
        .terminal-header { 
            font-size: 0.75rem; color: #64748b; margin-bottom: 12px; 
            border-bottom: 1px dashed rgba(255,255,255,0.1); padding-bottom: 6px; 
            display: flex; justify-content: space-between;
        }
        
        .data-row { padding: 12px 0; border-bottom: 1px solid rgba(255,255,255,0.05); font-size: 0.85rem; line-height: 1.6; }
        .leak-source { color: var(--accent); font-weight: bold; }
        .leak-info { color: #cbd5e1; display: block; margin-top: 2px; }

        .loader-box { display: none; margin: 20px auto; }
        .loader-gif { width: 50px; height: 50px; border-radius: 50%; }
        
        .admin-link { 
            display: inline-block; margin-top: 25px; color: rgba(255,255,255,0.6); text-decoration: none; 
            font-size: 0.8rem; padding: 8px 20px; border-radius: 20px; 
            background: rgba(255, 255, 255, 0.03); border: 1px solid var(--glass-border);
            transition: 0.3s;
        }
        .admin-link:hover { color: var(--primary); border-color: var(--primary); background: rgba(0, 255, 204, 0.05); }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo-wrapper">
            <img src="https://media.giphy.com/media/3wr2cnwlghNomDeN9W/giphy.gif" alt="Logo" class="logo-gif">
        </div>

        <h1>SHADOW OSINT INVESTOR</h1>
        <span class="subtitle">Breach Leak Scanner</span>

        <div class="input-group">
            <input type="text" id="targetInput" placeholder="Enter Target Email or Phone...">
        </div>
        <button onclick="executeScan()" class="scan-btn" id="btnSubmit">Initiate Deep Scan</button>

        <div class="loader-box" id="loader">
            <img src="https://media.giphy.com/media/3wr2cnwlghNomDeN9W/giphy.gif" class="loader-gif">
            <p style="color: var(--primary); font-size: 0.8rem; margin-top: 8px; letter-spacing: 1px;">SEARCHING DATA LEAKS...</p>
        </div>

        <div id="result">
            <div class="terminal-header">
                <span>[BREACH REGISTER]</span>
                <span id="timestamp">STATUS: IDLE</span>
            </div>
            <div id="resultContent"></div>
        </div>

        <br>
        <a href="https://t.me/SHADOW_JOKER_CTH" target="_blank" class="admin-link">
            <i class="fa-brands fa-telegram"></i> Secure Contact Admin
        </a>
    </div>

    <script>
        async function executeScan() {
            let target = document.getElementById('targetInput').value.trim();
            const btn = document.getElementById('btnSubmit');
            const loader = document.getElementById('loader');
            const resultDiv = document.getElementById('result');
            const resultContent = document.getElementById('resultContent');
            const timestamp = document.getElementById('timestamp');

            if (!target) return alert("দয়া করে একটি ইমেইল বা নম্বর ইনপুট দিন!");

            loader.style.display = "block";
            resultDiv.style.display = "none";
            resultContent.innerHTML = "";
            btn.disabled = true;
            timestamp.innerText = "QUERYING CORE...";

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ target: target })
                });
                const resData = await response.json();

                if (resData.success && resData.data && resData.data.success) {
                    const results = resData.data.result || [];
                    if (results.length === 0) {
                        resultContent.innerHTML = `<p style="color:var(--primary); text-align:center; font-size:0.85rem;">🟢 Secure! No data leak found in public repositories.</p>`;
                    } else {
                        results.forEach(leak => {
                            const div = document.createElement('div');
                            div.className = 'data-row';
                            div.innerHTML = `
                                📁 <span class="leak-source">Source: ${leak.sources || 'Unknown Breach'}</span>
                                <span class="leak-info">📧 Pwned Data: ${leak.email || 'N/A'}</span>
                                <span class="leak-info">🔑 Password/Hash: <span style="color:var(--warning)">${leak.password || 'Hashes Locked'}</span></span>
                            `;
                            resultContent.appendChild(div);
                        });
                    }
                    timestamp.innerText = "SUCCESS (200)";
                    resultDiv.style.display = "block";
                } else {
                    alert("RapidAPI Message: কোটা শেষ অথবা এরর রেসপন্স এসেছে!");
                    timestamp.innerText = "FAILED (403)";
                }
            } catch (err) {
                alert("সার্ভার টাইমআউট বা কানেকশন এরর!");
                timestamp.innerText = "CRITICAL ERROR";
            } finally {
                loader.style.display = "none";
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
